name: Build APK and AAB

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Generate Keystore
        run: |
          mkdir -p keystore
          keytool -genkey -v \
            -keystore keystore/getredeemcode.jks \
            -alias getredeemcode \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass GetRedeem2024 \
            -keypass GetRedeem2024 \
            -dname "CN=GetRedeemCode, OU=App, O=GetRedeemCode, L=India, S=India, C=IN"

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g"

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g"
          STORE_PASSWORD: GetRedeem2024
          KEY_ALIAS: getredeemcode
          KEY_PASSWORD: GetRedeem2024

      - name: Build Release AAB
        run: ./gradlew bundleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g"
          STORE_PASSWORD: GetRedeem2024
          KEY_ALIAS: getredeemcode
          KEY_PASSWORD: GetRedeem2024

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Debug-APK
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Release-APK
          path: app/build/outputs/apk/release/*.apk

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: Release-AAB-PlayStore
          path: app/build/outputs/bundle/release/*.aab
