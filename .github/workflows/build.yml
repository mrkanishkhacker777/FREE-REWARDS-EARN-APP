name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Make gradlew executable
        run: chmod +x gradlew
        
      - name: Build Release APK
        shell: bash
        run: |
          set -x
          java -version
          ./gradlew assembleRelease --stacktrace --info 2>&1 || true
          echo "BUILD DONE"
          ls -la app/build/outputs/apk/ 2>&1 || echo "No APK folder found"
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
